name: Wheels

permissions:
  contents: read

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_release:
    name: Validate release tag
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Validate tag and package version
      shell: bash
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name }}
      run: |
        set -euo pipefail

        if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
          tag="${RELEASE_TAG}"
        else
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::Wheels workflow must run on a tag ref, got ${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}."
            exit 1
          fi
          tag="${GITHUB_REF_NAME}"
        fi

        if [[ ! "${tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          echo "::error::Release tag must match vX.Y.Z, got '${tag}'."
          exit 1
        fi

        expected_version="${tag#v}"
        actual_version="$(python - <<'PY'
        import ast
        from pathlib import Path

        module = ast.parse(Path("setup.py").read_text())
        for node in module.body:
            if isinstance(node, ast.Assign):
                for target in node.targets:
                    if isinstance(target, ast.Name) and target.id == "__version__":
                        value = ast.literal_eval(node.value)
                        if not isinstance(value, str):
                            raise SystemExit("__version__ is not a string literal")
                        print(value)
                        raise SystemExit(0)
        raise SystemExit("__version__ not found in setup.py")
        PY
        )"

        if [[ "${actual_version}" != "${expected_version}" ]]; then
          echo "::error::setup.py __version__ (${actual_version}) must equal tag version (${expected_version})."
          exit 1
        fi

        echo "Validated ${tag}: setup.py __version__ is ${actual_version}."

  build_sdist:
    name: Build SDist
    needs: validate_release
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v4
      with:
        path: dist/*.tar.gz
        name: sdist


  build_wheels:
    name: Wheels (${{ matrix.squirrel.label }}) on ${{ matrix.os }}
    needs: validate_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-latest]
        squirrel:
          - variant: sq32
            label: Squirrel 3.2.x
          - variant: sq305
            label: Squirrel 3.0.5

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - uses: lukka/get-cmake@v3.31.6

    - uses: pypa/cibuildwheel@v4.1.0
      env:
        CIBW_SKIP: pp* *_i686 *musllinux* cp3??t-*
        CIBW_ENVIRONMENT: >-
          SQUIRREL_PY_VARIANT=${{ matrix.squirrel.variant }}
          CMAKE_POLICY_VERSION_MINIMUM=3.5
        MACOSX_DEPLOYMENT_TARGET: 10.14
        CMAKE_POLICY_VERSION_MINIMUM: 3.5

    - name: Verify clean directory
      run: git diff --exit-code
      shell: bash

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        path: wheelhouse/*.whl
        name: native-wheelhouse-${{ matrix.squirrel.variant }}-${{ matrix.os }}

  build_pyodide:
    name: Pyodide Wheels (${{ matrix.squirrel.label }})
    needs: validate_release
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        squirrel:
          - variant: sq32
            label: Squirrel 3.2.x
          - variant: sq305
            label: Squirrel 3.0.5

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install build tools
      run: python -m pip install --upgrade pip cmake ninja pybind11 pyodide-build==0.36.0 pyodide-py==314.0.2

    - name: Build Pyodide wheel
      run: |
        mkdir -p "wheelhouse/${SQUIRREL_PY_VARIANT}"
        pyodide build . -o "wheelhouse/${SQUIRREL_PY_VARIANT}"
      env:
        SQUIRREL_PY_VARIANT: ${{ matrix.squirrel.variant }}
        CMAKE_POLICY_VERSION_MINIMUM: 3.5

    - name: Upload Pyodide wheels
      uses: actions/upload-artifact@v4
      with:
        path: wheelhouse/${{ matrix.squirrel.variant }}/*.whl
        name: pyodide-wheelhouse-${{ matrix.squirrel.variant }}

  upload_release_assets:
    name: Upload release assets
    needs: [build_wheels, build_pyodide, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Upload packages to release
      run: gh release upload "${{ github.event.release.tag_name }}" dist/* --repo "${{ github.repository }}" --clobber
      env:
        GH_TOKEN: ${{ github.token }}

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'release' && github.event.action == 'published') ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: native-wheelhouse-*
        path: dist
        merge-multiple: true

    - uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - uses: pypa/gh-action-pypi-publish@v1
