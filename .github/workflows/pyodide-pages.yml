name: Pyodide Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pyodide-pages.yml"
      - "CMakeLists.txt"
      - "setup.py"
      - "pyproject.toml"
      - "docs/**"
      - "squirrel-lang/**"
      - "libs/SQUIRREL32/**"
      - "libs/SQUIRREL305/**"
      - "libs/squall/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip cmake ninja pybind11 pyodide-build==0.36.0 pyodide-py==314.0.2

      - name: Build Pyodide wheels
        run: |
          for variant in sq32 sq305; do
            rm -rf build .pyodide_build
            mkdir -p "wheelhouse/$variant"
            SQUIRREL_PY_VARIANT="$variant" pyodide build . -o "wheelhouse/$variant"
          done
        env:
          CMAKE_POLICY_VERSION_MINIMUM: 3.5

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/wheels/sq32 _site/wheels/sq305
          cp docs/index.html _site/index.html
          cp wheelhouse/sq32/*.whl _site/wheels/sq32/
          cp wheelhouse/sq305/*.whl _site/wheels/sq305/
          python - <<'PY'
          import json
          from pathlib import Path

          versions = {
              "sq32": {"label": "3.2.x"},
              "sq305": {"label": "3.0.5"},
          }
          for version in versions:
              wheels = sorted(Path(f"_site/wheels/{version}").glob("*.whl"))
              if len(wheels) != 1:
                  raise SystemExit(
                      f"expected one {version} wheel, found {len(wheels)}"
                  )
              versions[version]["wheel"] = f"wheels/{version}/{wheels[0].name}"

          manifest = {
              "pyodideIndexURL": "https://cdn.jsdelivr.net/pyodide/v314.0.2/full/",
              "defaultVersion": "sq32",
              "versions": versions,
          }
          Path("_site/wheel.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
